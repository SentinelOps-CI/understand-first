version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/examples/react_dashboard"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/ide/vscode/understand-first"
    schedule:
      interval: "weekly"
