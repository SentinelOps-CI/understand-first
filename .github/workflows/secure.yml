name: Security

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync and audit
        run: |
          uv sync --all-extras --frozen
          uv run pip-audit --strict
